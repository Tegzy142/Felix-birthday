<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Gazette</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Add your CSS styling here */
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            color: #333;
        }
        .container {
            width: 80%;
            margin: auto;
            overflow: hidden;
        }
        header {
            background: #35424a;
            color: #ffffff;
            padding: 20px 0;
            text-align: center;
        }
        article {
            padding: 20px;
            background: #ffffff;
            margin-bottom: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        footer {
            text-align: center;
            padding: 10px 0;
            background: #35424a;
            color: #ffffff;
        }
    </style>
</head>
<body>
    <header>
        <h1>Happy Birthday Felix!</h1>
    </header>
    <div class="container">
        <article>
            <h2>Welcome to the Birthday Gazette!</h2>
            <p>Join us as we celebrate Felix's special day!</p>
            <p>[Insert additional content here]</p>
            <p>Don't forget to check out the animations below!</p>
        </article>
        <article>
            <h2>Birthday Wishes</h2>
            <p>[Insert birthday wishes here]</p>
        </article>
    </div>
    <footer>
        <p>© 2026 Felix's Birthday Gazette</p>
    </footer>
</body>
</html>
